title: Apps Homemade by CVG
description: |
  From time to time I make some little application, purely for fun, to prove my
  point or to help someone. This site now brings these all together on a
  unified stage with information and links to more information, if you are
  interested.
  Soon I'm going to extend all these apps and include a demo
  account/functionality, so you can actually try them for yourself. Soon...! 😇
apps:

  hello:
    path: /hello
    hostname: hello.app.homemadebycvg.com
    local: hello.app.homemadebycvg.local:8080
    image: /images/hello.png
    description: |
      The obligatory `hello world` example, serving
      a basic, plain [Flask](https://flask.palletsprojects.com) app.

  nationofpositivity:
    title: Nation of Positivity
    hostname: nationofpositivity.com
    local: nationofpositivity.local:8080
    image: /images/nationofpositivity.svg
    description: |
      Geef het geschenk van _positiviteit_! In de Nation of Positivity vind je
      tal van kleine leuke attenties. Allemaal gepersonaliseerd en bedoeld om
      jouw positiviteit aan iemand anders te kunnen schenken.
      Met Nation of Positivity bied ik mijn atelier en eigen werk aan in een
      kleine online shop. Met liefde gemaakt om met veel liefde te geven. Samen
      zorgen voor wat meer positiviteit in de wereld.

  homemade:
    title: Homemade By CVG
    hostname: homemadebycvg.com
    local: homemadebycvg.local:8080
    github: christophevg/homemadebycvg.com
    image: /images/homemade.png
    description: |
      I don't only make apps. I sometimes also endulge in some form of physical
      crafting. The top-level landing page app is recursively also hosted as a
      hosted flask.

  roomz:
    title: Roomz
    hostname: roomz.app.homemadebycvg.com
    local: roomz.app.homemadebycvg.local:8080
    github: christophevg/roomz
    docs: https://roomz.readthedocs.io
    image: /images/roomz.png
    description: |
      Roomz is my real-time private chatroom web service that uses magic link authentication and JWT-governed sessions. It provides a secure, invite-only chat, usually for bot interactions. It’s the first new project I’ve built using the new async Baseweb.

  getijden:
    title: Getijden
    hostname: getijden.app.homemadebycvg.com
    local: getijden.app.homemadebycvg.local:8080
    github: christophevg/getijden
    image: /images/getijden.png
    description: |
      Deze getijden app, maakt de informatie van het "Agentschap Maritieme
      Dienstverlening en Kust" direct bruikbaar voor je persoonlijke kalender.

  letmelearn:
    title: Let me Learn
    hostname: letmelearn.app.homemadebycvg.com
    local: letmelearn.app.homemadebycvg.local:8080
    github: christophevg/letmelearn
    image: /images/letmelearn.png
    description: |
      Toen Quizlet grotendeels betalend werd, en dochterlief enkele belangrijke
      toetsen in het verschiet had, was er maar één ding dat ik kon doen...
      "Let me Learn!" is een online/web toepassinkje dat toelaat om op
      verschillende manieren begrippen/woorden/... te oefenen, leren en te testen.
      Want wat je zelf implementeert... 😇

  baseweb-demo:
    title: Baseweb Demo
    hostname: baseweb-demo.app.homemadebycvg.com
    local: baseweb-demo.app.homemadebycvg.local:8080
    github: christophevg/baseweb-demo
    docs: https://baseweb.readthedocs.io
    image: /images/baseweb-demo.png
    description: |
      [Baseweb](https://github.com/christophevg/baseweb) is my little bit of
      Python serving a lot of [Vuetify](https://vuetifyjs.com) goodness, all
      rolled up in a little [Python Module](https://pypi.org/project/baseweb/).
      The [baseweb-demo](https://github.com/christophevg/baseweb-demo) repository
      contains a "demo implementation", showing off many of baseweb's features.

  howifeel:
    title: How I Feel
    hostname: howifeel.app.homemadebycvg.com
    local: howifeel.app.homemadebycvg.local:8080
    github: christophevg/howifeel
    image: /images/howifeel.png
    description: |
      _Putting the dot on the i of micro social network._
      _Share your mood with who you want and how you want. And nothing more._
      How I Feel began as a "Let me show you in one hour what software
      development really is about." and turned out to be much more...

  oatk-demo:
    title: OAuthToolKit Demo
    hostname: oatk-demo.app.homemadebycvg.com
    local: oatk-demo.app.homemadebycvg.local:8080
    github: christophevg/oatk
    image: /images/oatk-demo.png
    description: |
      OAuth is a standard and OAuthToolKit is my minimal implementation of some
      aspects of it.
      This demo allows you to login using your Google account and
      then uses that authentication to access a protected API endpoint.
      **NOTE** No personal information is used or stored in any way! Just the
      token is validated by the API.
