# === MONITORING STACK ===

[program:prometheus]
command=/opt/monitoring/bin/prometheus --config.file=/opt/monitoring/config/prometheus.yml --storage.tsdb.path=/opt/monitoring/prometheus/data --web.listen-address=127.0.0.1:9090 --storage.tsdb.retention.time=7d --web.enable-lifecycle
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=PYTHONUNBUFFERED="1"
priority=5

[program:grafana]
command=/usr/share/grafana/bin/grafana-server --homepath=/usr/share/grafana --config=/opt/monitoring/config/grafana.ini
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=PYTHONUNBUFFERED="1",GF_PATHS_DATA="/opt/monitoring/grafana/data",GF_PATHS_PLUGINS="/opt/monitoring/grafana/plugins",GF_SECURITY_ADMIN_USER="admin",GF_SECURITY_ADMIN_PASSWORD="%(ENV_GRAFANA_ADMIN_PASSWORD)s",GF_USERS_ALLOW_SIGN_UP="false",GF_SERVER_HTTP_ADDR="127.0.0.1",GF_SERVER_HTTP_PORT="3000"
priority=5

[program:loki]
command=/opt/monitoring/bin/loki -config.file=/opt/monitoring/config/loki-config.yml
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=PYTHONUNBUFFERED="1"
priority=5

[program:promtail]
command=/opt/monitoring/bin/promtail -config.file=/opt/monitoring/config/promtail-config.yml
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=PYTHONUNBUFFERED="1"
priority=5

[program:node_exporter]
command=/opt/monitoring/bin/node_exporter --web.listen-address=127.0.0.1:9100 --collector.filesystem.mount-points-exclude="^/(dev|proc|sys|var/lib/(docker|containerd)/.+)($|/)" --collector.filesystem.fs-types-exclude="^(autofs|binfmt_misc|cgroup|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|mqueue|proc|pstore|securityfs|sysfs|tracefs)$"
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=PYTHONUNBUFFERED="1"
priority=5

[program:nginx_exporter]
command=/opt/monitoring/bin/nginx-prometheus-exporter --nginx.scrape-uri=http://127.0.0.1:9113/stub_status --web.listen-address=127.0.0.1:9114
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=PYTHONUNBUFFERED="1"
priority=5
