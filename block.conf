# Block PHP scripts
location ~ \.php$ {
  return 444;
}

# Block WordPress paths
location ~ ^/wp- {
  return 444;
}

# Block CGI
location ~ ^/cgi-bin {
  return 444;
}

# Block hidden files (.env, .git, .htaccess, etc.)
location ~ /\. {
  return 444;
}

# Block backup files
location ~* \.(bak|backup|old|sql|zip|tar|gz)$ {
  return 444;
}

# Block exposed config files
location ~* (config|settings|configuration)\.(php|json|yml|yaml|xml|ini)$ {
  return 444;
}

# Block common admin panel probes
location ~* ^/(admin|administrator|phpmyadmin|pma|mysql|myadmin) {
  return 444;
}

# Block WordPress login
location ~* ^/wp-login\.php {
  return 444;
}

# Block xmlrpc (DDoS vector)
location ~* ^/xmlrpc\.php {
  return 444;
}

# Block Outlook/Exchange probing
location ~* ^/(autodiscover|autoconfig|owa|exchange) {
  return 444;
}
