# Loki configuration for log aggregation
# Collects logs from supervisor, nginx, and applications

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info

common:
  instance_addr: 127.0.0.1
  path_prefix: /opt/monitoring/loki/data
  storage:
    filesystem:
      chunks_directory: /opt/monitoring/loki/data/chunks
      rules_directory: /opt/monitoring/loki/data/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

schema_config:
  configs:
    - from: 2020-10-24
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

ruler:
  alertmanager_url: http://localhost:9093

limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  retention_period: 168h  # 7 days
  max_query_length: 721h
  max_query_parallelism: 32

compactor:
  working_directory: /opt/monitoring/loki/data/compactor
  shared_store: filesystem
  retention_enabled: true
  retention_delete_delay: 2h

# Performance tuning
ingester:
  chunk_idle_period: 3m
  chunk_block_size: 262144
  chunk_retain_period: 1m
  max_transfer_retries: 0

querier:
  max_concurrent: 10

frontend:
  max_outstanding_per_tenant: 2048
  compress_responses: true