# Grafana dashboard provisioning
# Automatically loads dashboards from the specified directory

apiVersion: 1

providers:
  - name: 'apps-homemadebycvg'
    orgId: 1
    folder: 'Apps'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /opt/monitoring/grafana/dashboards
      foldersFromFilesStructure: false