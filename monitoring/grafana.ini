# Grafana configuration for apps.homemadebycvg monitoring
# Minimal configuration for containerized deployment

[server]
http_addr = 127.0.0.1
http_port = 3000
protocol = http
domain = localhost
root_url = %(protocol)s://%(domain)s:%(http_port)s/

[database]
type = sqlite3
path = /opt/monitoring/grafana/data/grafana.db

[paths]
data = /opt/monitoring/grafana/data
logs = /opt/monitoring/grafana/logs
plugins = /opt/monitoring/grafana/plugins
provisioning = /opt/monitoring/config/grafana/provisioning

[security]
admin_user = admin
; Password set via GF_SECURITY_ADMIN_PASSWORD environment variable
disable_initial_admin_creation = false

[users]
allow_sign_up = false
allow_org_create = false
auto_assign_org = true
auto_assign_org_role = Viewer
default_theme = dark

[auth]
disable_login_form = false
disable_signout_menu = false

[auth.anonymous]
enabled = false

[dashboards]
default_home_dashboard_path = /opt/monitoring/grafana/dashboards/system-overview.json

[plugins]
enable_alpha = false
allow_loading_unsigned_plugins =

[alerting]
enabled = false

[unified_alerting]
enabled = true
execute_alerts = true

[metrics]
enabled = true
interval_seconds = 60

[log]
mode = console
level = info

[log.console]
level = info

[remote_cache]
type = database