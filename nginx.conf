# Nginx reverse proxy configuration for hosted-flasks apps
# Routes traffic based on hostname and path to appropriate apps
#
# Hostname routing: production hostnames (e.g., hello.app.homemadebycvg.com)
# Path routing: local development via localhost with path prefixes
#
# Monitoring: Grafana dashboard at monitor.homemadebycvg.com (Basic Auth protected)

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Enhanced log format with timing data for Prometheus/Loki
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_host" - "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time" '
                    'upstream_addr="$upstream_addr"';

    # Access log for Promtail collection
    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    proxy_buffers 16 16k;
    proxy_buffer_size 16k;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Upstream definitions for each app
    # all run on localhost with different ports
    upstream frontpage { server 127.0.0.1:5000; }
    upstream hello { server 127.0.0.1:5001; }
    upstream parking { server 127.0.0.1:5002; }
    upstream nationofpositivity { server 127.0.0.1:5004; }
    upstream homemadebycvg { server 127.0.0.1:5005; }
    upstream getijden { server 127.0.0.1:5006; }
    upstream letmelearn { server 127.0.0.1:5007; }
    upstream baseweb_demo { server 127.0.0.1:5008; }
    upstream howifeel { server 127.0.0.1:5009; }
    upstream oatk { server 127.0.0.1:5010; }
    upstream roomz { server 127.0.0.1:5011; }

    # ========== HOSTNAME-BASED ROUTING (Production) ==========

    # hello - hello.app.homemadebycvg.com
    server {
        listen 10000;
        server_name hello.app.homemadebycvg.com hello.app.homemadebycvg.local;
        access_log /dev/stdout main;
        location / {
            proxy_pass http://hello;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # parking - archiku.com, archiku.org
    server {
        listen 10000;
        server_name archiku.com archiku.org;
        access_log /dev/stdout main;
        location / {
            proxy_pass http://parking;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # nationofpositivity - nationofpositivity.com
    server {
        listen 10000;
        server_name nationofpositivity.com nationofpositivity.local;
        access_log /dev/stdout main;
        location / {
            proxy_pass http://nationofpositivity;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # homemadebycvg.com - homemadebycvg.com
    server {
        listen 10000;
        server_name homemadebycvg.com homemadebycvg.local;
        access_log /dev/stdout main;
        location / {
            proxy_pass http://homemadebycvg;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # getijden - getijden.app.homemadebycvg.com
    server {
        listen 10000;
        server_name getijden.app.homemadebycvg.com getijden.app.homemadebycvg.local;
        access_log /dev/stdout main;
        location / {
            proxy_pass http://getijden;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # letmelearn - letmelearn.app.homemadebycvg.com
    server {
        listen 10000;
        server_name letmelearn.app.homemadebycvg.com letmelearn.app.homemadebycvg.local;
        access_log /dev/stdout main;
        location / {
            proxy_pass http://letmelearn;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # baseweb-demo - baseweb-demo.app.homemadebycvg.com
    server {
        listen 10000;
        server_name baseweb-demo.app.homemadebycvg.com baseweb-demo.app.homemadebycvg.local;
        access_log /dev/stdout main;
        location / {
            proxy_pass http://baseweb_demo;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /socket.io {
            proxy_pass http://baseweb_demo;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket upgrade
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Timeouts
            proxy_connect_timeout 60;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;

            # Buffering
            proxy_buffering off;
            proxy_cache off;
        }
    }

    # howifeel - howifeel.app.homemadebycvg.com
    server {
        listen 10000;
        server_name howifeel.app.homemadebycvg.com howifeel.app.homemadebycvg.local;
        access_log /dev/stdout main;
        location / {
            proxy_pass http://howifeel;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # oatk - oatk-demo.app.homemadebycvg.com
    server {
        listen 10000;
        server_name oatk-demo.app.homemadebycvg.com oatk-demo.app.homemadebycvg.local;
        access_log /dev/stdout main;
        location / {
            proxy_pass http://oatk;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # roomz - roomz.app.homemadebycvg.com
    server {
        listen 10000;
        server_name roomz.app.homemadebycvg.com roomz.app.homemadebycvg.local;
        access_log /dev/stdout main;
        location / {
            proxy_pass http://roomz;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /socket.io {
            proxy_pass http://roomz;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket upgrade
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Timeouts
            proxy_connect_timeout 60;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;

            # Buffering
            proxy_buffering off;
            proxy_cache off;
        }
    }

    # ========== PATH-BASED ROUTING + default/frontpage server ==========

    server {
        listen 10000;
        server_name apps.homemadebycvg.com apps.homemadebycvg.local apps-homemadebycvg-1.onrender.com;
        access_log /dev/stdout main;

        # Path-based routing for each app (strip prefix when proxying)
        location /hello {
            rewrite ^/hello/?(.*)$ /$1 break;
            proxy_pass http://hello;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /parking {
            rewrite ^/parking/?(.*)$ /$1 break;
            proxy_pass http://parking;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Default - return 404
        location / {
            proxy_pass http://frontpage;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ===== requests without Host -> 444 / filter out scanner spam =====

    server {
        listen 10000 default_server;
        server_name _;
        return 444;
    }

    # ========== MONITORING ENDPOINTS ==========

    # Nginx stub_status for Prometheus nginx_exporter
    server {
        listen 127.0.0.1:9113;
        server_name localhost;

        location /stub_status {
            stub_status;
            access_log off;
        }
    }

    # Grafana Dashboard - External access
    # Access at: monitor.homemadebycvg.com or monitor.homemadebycvg.local
    # Login: admin / admin123 (Grafana credentials)
    server {
        listen 10000;
        server_name monitor.homemadebycvg.com monitor.homemadebycvg.local monitor.app.homemadebycvg.local;

        location / {
            proxy_pass http://127.0.0.1:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
